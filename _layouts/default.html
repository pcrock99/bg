{{ content }}

<!-- 返回顶部按钮 -->
<button onclick="topFunction()" id="backToTop" title="返回顶部" style="display: none; position: fixed; bottom: 30px; right: 30px; z-index: 99; border: 1px solid #666; outline: none; background-color: rgba(0, 0, 0, 0.5); color: #888; cursor: pointer; padding: 12px 16px; border-radius: 8px; font-size: 16px; font-weight: bold; backdrop-filter: blur(4px);">顶</button>

<style>
/* 代码块容器样式（让按钮可以绝对定位） */
.highlight {
  position: relative;
}

/* 复制按钮样式 */
.copy-btn {
  position: absolute;
  top: 8px;
  right: 8px;
  background-color: rgba(0, 0, 0, 0.6);
  border: 1px solid #0f0;
  color: #0f0;
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  font-family: monospace;
  transition: all 0.2s ease;
  z-index: 10;
}

.copy-btn:hover {
  background-color: rgba(0, 255, 0, 0.2);
  color: #fff;
}

/* 复制成功时的样式 */
.copy-btn.copied {
  border-color: #ffcc00;
  color: #ffcc00;
}
</style>

<script>
// 复制按钮功能
(function() {
  // 找到所有代码块
  var codeBlocks = document.querySelectorAll('.highlight');
  
  codeBlocks.forEach(function(block) {
    // 创建复制按钮
    var btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.textContent = '复制';
    
    // 把按钮添加到代码块里
    block.style.position = 'relative';
    block.appendChild(btn);
    
    // 点击复制
    btn.addEventListener('click', function() {
      // 获取代码内容（排除行号等干扰）
      var code = block.querySelector('code');
      var text = code ? code.innerText : block.innerText;
      
      // 复制到剪贴板
      navigator.clipboard.writeText(text).then(function() {
        // 复制成功反馈
        btn.textContent = '已复制 ✓';
        btn.classList.add('copied');
        setTimeout(function() {
          btn.textContent = '复制';
          btn.classList.remove('copied');
        }, 2000);
      }).catch(function(err) {
        console.error('复制失败:', err);
        btn.textContent = '失败';
        setTimeout(function() {
          btn.textContent = '复制';
        }, 1500);
      });
    });
  });
})();

// 返回顶部按钮逻辑
var mybutton = document.getElementById("backToTop");

window.onscroll = function() {
  if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
    mybutton.style.display = "block";
  } else {
    mybutton.style.display = "none";
  }
};

function topFunction() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
