<!-- 返回顶部按钮 -->
<button onclick="topFunction()" id="backToTop" title="返回顶部" style="display: none; position: fixed; bottom: 30px; right: 30px; z-index: 99; border: 1px solid #666; outline: none; background-color: rgba(0, 0, 0, 0.5); color: #888; cursor: pointer; padding: 12px 16px; border-radius: 8px; font-size: 16px; font-weight: bold; backdrop-filter: blur(4px);">↑</button>

<script>
// 获取按钮
var mybutton = document.getElementById("backToTop");

// 滚动超过 300px 时显示按钮
window.onscroll = function() {
  if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
    mybutton.style.display = "block";
  } else {
    mybutton.style.display = "none";
  }
};

// 点击回到顶部
function topFunction() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
