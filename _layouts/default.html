<!-- 返回顶部按钮 -->
<button onclick="topFunction()" id="backToTop" title="返回顶部" style="display: none; position: fixed; bottom: 30px; right: 30px; z-index: 99; border: 1px solid #666; outline: none; background-color: rgba(0, 0, 0, 0.5); color: #888; cursor: pointer; padding: 12px 16px; border-radius: 8px; font-size: 16px; font-weight: bold; backdrop-filter: blur(4px);">↑ 顶部</button>

<style>
/* 代码块复制按钮样式（保持原有功能） */
.highlight {
  position: relative;
}
.copy-btn {
  position: absolute;
  top: 8px;
  right: 8px;
  background-color: rgba(0, 0, 0, 0.6);
  border: 1px solid #0f0;
  color: #0f0;
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  font-family: monospace;
  transition: all 0.2s ease;
  z-index: 10;
}
.copy-btn:hover {
  background-color: rgba(0, 255, 0, 0.2);
  color: #fff;
}
.copy-btn.copied {
  border-color: #ffcc00;
  color: #ffcc00;
}
</style>

<script>
// 复制按钮功能
(function() {
  var codeBlocks = document.querySelectorAll('.highlight');
  codeBlocks.forEach(function(block) {
    var btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.textContent = '复制';
    block.style.position = 'relative';
    block.appendChild(btn);
    btn.addEventListener('click', function() {
      var code = block.querySelector('code');
      var text = code ? code.innerText : block.innerText;
      navigator.clipboard.writeText(text).then(function() {
        btn.textContent = '已复制 ✓';
        btn.classList.add('copied');
        setTimeout(function() {
          btn.textContent = '复制';
          btn.classList.remove('copied');
        }, 2000);
      }).catch(function(err) {
        console.error('复制失败:', err);
        btn.textContent = '失败';
        setTimeout(function() {
          btn.textContent = '复制';
        }, 1500);
      });
    });
  });
})();

// 返回顶部按钮逻辑
var mybutton = document.getElementById("backToTop");
window.onscroll = function() {
  if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
    mybutton.style.display = "block";
  } else {
    mybutton.style.display = "none";
  }
};
function topFunction() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
