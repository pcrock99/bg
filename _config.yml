title: pcrock
description: 一个乱七八糟的...脏、乱、差...
baseurl: "/bg"
url: "https://pcrock99.github.io"

# 主题
remote_theme: pages-themes/hacker@v0.2.0

# 分页配置
paginate: 5
paginate_path: "/page:num/"

# 插件
plugins:
  - jekyll-remote-theme
  - jekyll-paginate

# 自定义颜色
theme_color: "#159957"   # 改成你喜欢的绿色

# 自定义文章排序
collections:
  posts:
    output: true
    sort_by: date  # 按日期排序（默认）

# 替代排序选项示例
# collections:
#   posts:
#     output: true
#     sort_by: title  # 按标题字母顺序排序

